# Fallback-Indexer: Der reguläre Index-Aufbau passiert direkt im
# validate-island-Workflow (Pushes mit GITHUB_TOKEN triggern on:push nicht —
# GitHub-Rekursionsschutz). Dieser Workflow fängt direkte Pushes des
# Repo-Inhabers ab und läuft zusätzlich täglich + manuell.
name: Index neu aufbauen (Fallback)
on:
  push:
    branches: [main]
    paths: ['islands/**']
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/build-index.mjs
      - name: Index committen
        run: |
          git config user.name "idlevolution-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet || { git commit -m "chore: index.json aktualisiert"; git push; }
