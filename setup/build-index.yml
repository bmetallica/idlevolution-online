# Baut index.json neu, sobald Insel-Daten auf main landen.
# (Der Index-Commit selbst berührt islands/ nicht → keine Schleife.)
name: Index neu aufbauen
on:
  push:
    branches: [main]
    paths: ['islands/**']

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/build-index.mjs
      - name: Index committen
        run: |
          git config user.name "idlevolution-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet || { git commit -m "chore: index.json aktualisiert"; git push; }
